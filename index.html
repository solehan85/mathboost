    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, delay=0) {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }, delay * 1000);
        }
        function soundClick() { playTone(400, 'sine', 0.1); }
        function soundCorrect() {
            playTone(523.25, 'triangle', 0.15, 0);
            playTone(659.25, 'triangle', 0.15, 0.1);
            playTone(783.99, 'triangle', 0.15, 0.2);
            playTone(1046.50, 'triangle', 0.3, 0.3);
        }
        function soundWrong() {
            playTone(180, 'sawtooth', 0.3, 0);
            playTone(130, 'sawtooth', 0.4, 0.15);
        }
        function soundCheckout() {
            playTone(880, 'sine', 0.05, 0);
            playTone(1760, 'sine', 0.1, 0.05);
        }
    </script>

        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let confettiPieces = [];
        function initConfetti() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            confettiPieces = [];
            for (let i = 0; i < 100; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    tilt: Math.random() * 10 - 5,
                    speed: Math.random() * 3 + 2
                });
            }
        }
        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            confettiPieces.forEach(p => {
                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                ctx.stroke();
                
                p.y += p.speed;
                p.tilt = Math.sin(p.y / 10) * 5;
                
                if (p.y < canvas.height) active = true;
            });
            if (active) requestAnimationFrame(drawConfetti);
            else canvas.style.display = 'none';
        }
        function triggerConfettiBurst() {
            canvas.style.display = 'block';
            initConfetti();
            drawConfetti();
        }

            let itemC = itemsShuffled[2];

            let questionText = "";
            let answersOptions = [];
            let correctAnswer = 0;

            let questionSet = Math.floor(Math.random() * 4) + 1;

            switch(levelType) {
                case "add":
                    if (questionSet === 1) {
                        let qty = Math.floor(Math.random() * 3) + 2;

                    } else if (questionSet === 3) {
                        let qtyA = 2, qtyB = 1;
                        correctAnswer = (qtyA * itemA.price) + (qtyB * itemB.price);
                        questionText = `Kira bayaran untuk pembelian pukal <b>${qtyA} ${itemA.name}</b> berserta <b>${qtyB} ${itemB.name}</b>.`;
                    } else {
                        correctAnswer = itemA.price + itemB.price + itemC.price;
                        questionText = `Siti memasukkan ${itemA.name}, ${itemB.name}, dan ${itemC.name} ke dalam troli. Kira jumlah harga kesemuanya.`;
                    }
                    break;

                case "sub":
                    if (questionSet === 1) {
                        let budget = 20;
                        correctAnswer = budget - itemA.price;
                        questionText = `Anda mempunyai wang sebanyak <b>RM${budget}</b> dan membeli 1 ${itemA.name}. Berapakah baki wang anda?`;

                        let budget = 50;

                        questionText = `Suresh membayar dengan nota <b>RM50</b> untuk membeli 2 ${itemA.unit} ${itemA.name}. Hitung baki wangnya.`;
                    } else if (questionSet === 3) {
                        correctAnswer = itemB.price - itemA.price;
                        if(correctAnswer < 0) { correctAnswer = Math.abs(correctAnswer); let temp = itemA; itemA = itemB; itemB = temp; }
                        questionText = `Berapakah perbezaan harga antara ${itemB.name} (RM${itemB.price.toFixed(2)}) dan ${itemA.name} (RM${itemA.price.toFixed(2)})?`;
                    } else {
                        let budget = 100;
                        correctAnswer = budget - itemC.price;
                        questionText = `Ayah memberikan wang <b>RM100</b> kepada juruwang untuk membeli 1 ${itemC.name}. Berapakah baki pulangan?`;
                    }
                    break;

                case "mul":
                    if (questionSet === 1) {
                        let mul = Math.floor(Math.random() * 3) + 3;
                        correctAnswer = itemA.price * mul;
                        questionText = `Jika 1 ${itemA.unit} ${itemA.name} berharga RM${itemA.price.toFixed(2)}, berapakah kos untuk <b>${mul} ${itemA.unit}</b>?`;
                    } else if (questionSet === 2) {
                        correctAnswer = itemB.price * 5;
                        questionText = `Hitung jumlah harga bagi <b>5 gandaan</b> paket ${itemB.name} yang disusun di atas rak.`;
                    } else if (questionSet === 3) {
                        correctAnswer = itemC.price * 2;
                        questionText = `Kakak membeli sepasang (<b>2 ${itemC.unit}</b>) ${itemC.name}. Berapakah jumlah pendaraban harga tersebut?`;
                    } else {
                        let mul = 10;
                        correctAnswer = itemA.price * mul;
                        questionText = `Pihak sekolah memesan sebanyak <b>10 ${itemA.unit} ${itemA.name}</b> untuk jamuan. Hitung jumlah harganya.`;
                    }
                    break;

                case "div":
                    if (questionSet === 1) {
                        let groups = 2;
                        let total = itemB.price * groups;
                        correctAnswer = itemB.price;
                        questionText = `Jumlah harga untuk ${groups} paket ${itemB.name} ialah <b>RM${total.toFixed(2)}</b>. Berapakah harga seunit?`;
                    } else if (questionSet === 2) {
                        let groups = 3;
                        let total = itemA.price * groups;
                        correctAnswer = itemA.price;
                        questionText = `Kongsi rezeki: 3 orang murid berkongsi membayar <b>RM${total.toFixed(2)}</b> untuk sekeranjang ${itemA.name}. Cari harga bahagian bagi seorang murid.`;

                        questionText = `Set kombo keluarga bagi 5 ${itemA.unit} ${itemA.name} berharga <b>RM${total.toFixed(2)}</b>. Berapakah kos asas seunit?`;

                        questionText = `Ibu membayar ${itemA.name} dan ${itemC.name}. Berapakah jumlah wang kertas dan syiling terpaksa diserahkan?`;
                    } else {
                        correctAnswer = (itemB.price * 2) + itemA.price;
                        questionText = `Kira jumlah kombinasi denominasi mata wang RM bagi pembelian dua ${itemB.name} serta satu ${itemA.name}.`;
                    }
                    break;

                case "fraction":
                    if (questionSet === 1) {
                        correctAnswer = itemC.price / 2;
                        questionText = `Pasar raya menawarkan potongan separuh harga (<span class="bg-amber-100 px-1.5 py-0.5 rounded text-amber-700 font-bold">1/2</span>) untuk 1 ${itemC.name} (Asal: RM${itemC.price.toFixed(2)}). Berapakah harga baharu?`;
                    } else if (questionSet === 2) {
                        correctAnswer = itemA.price * 0.25; 
                        questionText = `Suku bahagian (<span class="bg-amber-100 px-1.5 py-0.5 rounded text-amber-700 font-bold">1/4</span>) daripada berat ${itemA.name} telah rosak. Berapakah nilai kerugian wang jika harga penuh RM${itemA.price.toFixed(2)}?`;
                    } else if (questionSet === 3) {
                        correctAnswer = itemB.price * 0.75;
                        questionText = `Anda hanya perlu membayar tiga perempat (<span class="bg-amber-100 px-1.5 py-0.5 rounded text-amber-700 font-bold">3/4</span>) daripada nilai harga asal ${itemB.name} (RM${itemB.price.toFixed(2)}). Berapakah nilainya?`;
                    } else {
                        correctAnswer = itemA.price + (itemB.price / 2);
                        questionText = `Beli satu ${itemA.name} pada harga penuh and dapatkan ${itemB.name} kedua pada harga pecahan <span class="bg-amber-100 px-1.5 py-0.5 rounded text-amber-700 font-bold">1/2</span>. Berapakah harga keseluruhan?`;
                    }
                    break;

                case "decimal":
                    if (questionSet === 1) {
                        let weight = 1.5;
                        correctAnswer = itemA.price * weight;
                        questionText = `Timbang berat: Kira kos bagi <b>1.5 kg</b> ${itemA.name} jika kadar harga sekilo ialah RM${itemA.price.toFixed(2)}.`;
                    } else if (questionSet === 2) {
                        let weight = 2.5;
                        correctAnswer = itemB.price * weight;
                        questionText = `Mak Cik Timah menimbang <b>2.5 kg</b> ${itemB.name}. Hitung bayaran dalam bentuk perpuluhan ringgit.`;
                    } else if (questionSet === 3) {
                        let weight = 0.5;
                        correctAnswer = itemC.price * weight;
                        questionText = `Berapakah harga bagi paket mini seberat <b>0.5 kg</b> ${itemC.name} jika harga asal 1 kg ialah RM${itemC.price.toFixed(2)}?`;
                    } else {
                        let weight = 1.2;
                        correctAnswer = itemA.price * weight;
                        questionText = `Kira nilai perpuluhan bagi pembelian seberat <b>1.2 kg</b> ${itemA.name} di kaunter timbangan digital.`;
                    }
                    break;

                case "discount":
                    if (questionSet === 1) {
                        let pct = 10;
                        correctAnswer = itemB.price - (itemB.price * (pct / 100));
                        questionText = `Jualan Hari Raya! Produk ${itemB.name} mendapat diskaun <b>10%</b>. Berapakah harga selepas potongan?`;
                    } else if (questionSet === 2) {
                        let pct = 20;
                        correctAnswer = itemA.price - (itemA.price * (pct / 100));
                        questionText = `Kupon istimewa: Potongan sebanyak <b>20%</b> diberikan untuk ${itemA.name}. Berapakah harga jimat yang perlu dibayar?`;
                    } else if (questionSet === 3) {
                        let pct = 50;
                        correctAnswer = itemC.price - (itemC.price * (pct / 100));
                        questionText = `Runtuhan Harga Gudang! Diskaun hebat sebanyak <b>50%</b> ditawarkan untuk ${itemC.name}. Cari harga runtuh tersebut.`;
                    } else {
                        let pct = 5;
                        correctAnswer = itemB.price - (itemB.price * (pct / 100));
                        questionText = `Diskaun ahli kad keahlian sebanyak <b>5%</b> diberikan untuk item ${itemB.name}. Sila kira harga selepas diskaun.`;
                    }
                    break;

                case "mixed":
                    if (questionSet === 1) {
                        correctAnswer = (itemA.price * 2) - 3.00;
                        questionText = `Operasi Bergabung: Beli 2 ${itemA.name} kemudian tolak rebat baucar tunai bernilai <b>RM3.00</b>. Berapakah harga akhir?`;
                    } else if (questionSet === 2) {
                        correctAnswer = (itemB.price + itemC.price) * 2;
                        questionText = `Kira jumlah harga jika anda membeli 2 set kombo yang mengandungi (${itemB.name} + ${itemC.name}) serentak.`;
                    } else if (questionSet === 3) {
                        correctAnswer = (10.00 - itemA.price) + itemB.price;
                        questionText = `Anda ada wang RM10, baki selepas beli ${itemA.name} digunakan untuk menambah pembelian 1 ${itemB.name}. Kira nilai wang akhir anda.`;
                    } else {
                        correctAnswer = (itemC.price * 3) - itemA.price;
                        questionText = `Hitung hasil operasi: Tiga kali ganda harga ${itemC.name} ditolak dengan seunit harga bagi ${itemA.name}.`;
                    }
                    break;

                case "challenge":
                default:
                    if (questionSet === 1) {
                        correctAnswer = itemA.price + itemB.price + itemC.price;
                        questionText = `<b>Cabaran Trofi Set A!</b> Berapakah jumlah harga bakul jika anda memasukkan ${itemA.name}, ${itemB.name}, dan ${itemC.name}?`;
                    } else if (questionSet === 2) {
                        correctAnswer = (itemA.price * 2) + (itemB.price * 2);
                        questionText = `<b>Cabaran Trofi Set B!</b> Selesaikan gandaan berganda: Berapakah kos bagi 2 ${itemA.name} dan 2 ${itemB.name}?`;
                    } else if (questionSet === 3) {
                        correctAnswer = 100.00 - (itemA.price + itemB.price + itemC.price);
                        questionText = `<b>Cabaran Trofi Set C!</b> Kira baki daripada wang <b>RM100</b> selepas memborong ketiga-tiga barangan di rak pasar raya.`;
                    } else {
                        correctAnswer = (itemC.price * 4) / 2;
                        questionText = `<b>Cabaran Trofi Set D!</b> Berapakah harga bagi 4 unit ${itemC.name} selepas diberikan potongan diskaun separuh harga keseluruhan?`;
                    }
                    break;
            }

            correctAnswer = parseFloat(parseFloat(correctAnswer).toFixed(2));
            answersOptions.push(correctAnswer);
            
            // Algoritma Penjanaan Jawapan Palsu Pintar & Logik KSSR
            let originalSen = (correctAnswer % 1).toFixed(2); 
            let deviations = [-5.00, -2.00, -1.00, 1.00, 2.00, 5.00, 10.00];
            
            if (levelType === "fraction" || levelType === "decimal" || levelType === "discount") {
                deviations.push(-0.50, 0.50, -1.50, 1.50);
            }

            while(answersOptions.length < 4) {
                let randomDev = deviations[Math.floor(Math.random() * deviations.length)];
                let fakeAns = parseFloat((correctAnswer + randomDev).toFixed(2));
                
                if (parseFloat(originalSen) === 0 && (fakeAns % 0.5 !== 0)) {
                    fakeAns = Math.floor(fakeAns); 
                }

                if(fakeAns > 0 && !answersOptions.includes(fakeAns)) {
                    answersOptions.push(fakeAns);
                }
            }
            
            while(answersOptions.length < 4) {
                let fakeAns = parseFloat((correctAnswer + (Math.random() > 0.5 ? 3 : -3)).toFixed(0));
                if (fakeAns > 0 && !answersOptions.includes(fakeAns)) {
                    answersOptions.push(fakeAns);
                }
            }

            answersOptions.sort(() => 0.5 - Math.random());

            gameState.currentMission = {
                text: questionText,
                correct: correctAnswer,
                items: [itemA, itemB, itemC]
            };

            container.innerHTML = `
                <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                    <div class="md:col-span-2 flex flex-col gap-4">
                        <div class="card-3d rounded-2xl p-5 bg-gradient-to-r from-blue-50 to-indigo-50 border-t-8 border-t-blue-500">
                            <span class="bg-blue-600 text-white text-xs px-2.5 py-1 rounded-md font-bold uppercase tracking-wider">Misi Pembelian ${gameState.subQuestionIndex}/${gameState.maxQuestionsPerLevel} (Variasi ${questionSet})</span>
                            <h2 class="text-slate-700 font-medium text-lg sm:text-xl mt-3 leading-relaxed">${questionText}</h2>
                        </div>

                        <div class="bg-amber-100 border-4 border-amber-600/40 rounded-3xl p-4 shadow-inner">
                            <div class="text-xs font-black text-amber-800/60 uppercase mb-3"><i class="fa-solid fa-store mr-1"></i> Rak Barangan Pasar Raya</div>
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                                ${gameState.currentMission.items.map(prod => `
                                    <div class="bg-white rounded-2xl p-3 border-2 border-slate-200 shadow-md text-center flex flex-col items-center justify-between hover:scale-105 transition duration-200">
                                        <div class="text-4xl sm:text-5xl my-2">${prod.icon}</div>
                                        <div class="font-bold text-slate-700 text-sm sm:text-base">${prod.name}</div>
                                        ${levelType === "div" ? '' : `<div class="bg-emerald-100 text-emerald-700 font-extrabold px-3 py-0.5 rounded-full text-xs sm:text-sm mt-1">RM ${prod.price.toFixed(2)}</div>`}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-4">
                        <div class="card-3d rounded-2xl p-4 text-center bg-emerald-50 border-t-8 border-t-emerald-500 flex flex-col items-center">
                            <div class="text-4xl animate-bounce-slow">👩‍💼</div>
                            <div class="font-bold text-emerald-800 text-xs mt-1">Juruwang Comel</div>
                            <p class="text-xs text-slate-500 italic mt-1">"Sila pilih jawapan yang betul pada skrin kaunter!"</p>
                        </div>

                        <div class="bg-slate-800 border-4 border-slate-900 rounded-3xl p-4 shadow-2xl">
                            <div class="text-center text-cyan-400 font-mono text-xs tracking-widest uppercase mb-3"><i class="fa-solid fa-calculator mr-1"></i> Skrin Kaunter Pembayaran</div>
                            <div class="grid grid-cols-1 gap-3">
                                ${answersOptions.map(ans => `
                                    <button onclick="checkAnswer(${ans}, this)" class="w-full py-3 bg-slate-700 border-b-4 border-slate-900 text-white font-black text-lg rounded-xl hover:bg-slate-600 active:bg-slate-800 transition text-left px-5 flex items-center justify-between cursor-pointer">
                                        <span><i class="fa-solid fa-tag text-amber-400 mr-2 text-sm"></i> RM ${ans.toFixed(2)}</span>
                                        <i class="fa-solid fa-chevron-right text-xs opacity-40"></i>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function checkAnswer(selectedVal, btnElement) {
            if(selectedVal === gameState.currentMission.correct) {
                soundCorrect();
                triggerConfettiBurst();
                
                gameState.score += 10;
                gameState.coins += 5;
                
                btnElement.classList.remove('bg-slate-700', 'border-slate-900');
                btnElement.classList.add('bg-emerald-500', 'border-emerald-700', 'scale-105');
                
                let feedbackBanner = document.createElement('div');
                feedbackBanner.className = "fixed inset-0 bg-black/50 flex flex-col items-center justify-center z-50 animate-fade-in";
                feedbackBanner.innerHTML = `
                    <div class="bg-white rounded-3xl p-8 max-w-sm text-center border-4 border-emerald-500 shadow-2xl flex flex-col items-center gap-4 card-3d">
                        <div class="text-6xl animate-bounce">🏆</div>
                        <h1 class="text-3xl font-black text-emerald-600">🎉 TAHNIAH! 🎉</h1>
                        <p class="text-xl font-bold text-slate-700">"${["Hebat!", "Syabas!", "Anda Bijak!", "Cemerlang!", "Teruskan!"][Math.floor(Math.random()*5)]}"</p>
                        <div class="flex gap-4 text-sm font-bold text-slate-600 mt-2">
                            <span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full">+10 Mata</span>
                            <span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full">+5 Syiling</span>
                        </div>
                    </div>
                `;
                document.body.appendChild(feedbackBanner);

                setTimeout(() => {
                    feedbackBanner.remove();
                    gameState.subQuestionIndex++;
                    
                    if(gameState.subQuestionIndex > gameState.maxQuestionsPerLevel) {
                        gameState.stars++; 
                        gameState.subQuestionIndex = 1;
                        gameState.currentLevel++;
                        
                        if(gameState.currentLevel > 10) {
                            showEndGameScreen();
                            return;
                        }
                    }
                    
                    let safeKey = gameState.playerName.replace(/[.#$\[\]]/g, '_');
                    database.ref('players/' + safeKey).update({
                        skor: gameState.score,
                        syiling: gameState.coins,
                        bintang: gameState.stars,
                        tahapMaksimum: gameState.currentLevel,
                        kemaskiniTerakhir: new Date().toISOString()
                    });

                    generateMission();
                }, 2000);

            } else {
                soundWrong();
                btnElement.classList.add('animate-shake', 'bg-rose-500', 'border-rose-700');
                setTimeout(() => {
                    btnElement.classList.remove('animate-shake', 'bg-rose-500', 'border-rose-700');
                }, 500);
            }
        }

        function showEndGameScreen() {
            soundCheckout();
            document.getElementById('btn-back-home').classList.add('hidden');
            let container = document.getElementById('main-stage');
            
            container.innerHTML = `
                <div class="card-3d rounded-3xl p-8 w-full max-w-xl text-center border-t-8 border-t-yellow-400 bg-gradient-to-b from-amber-50 to-white flex flex-col items-center gap-6">
                    <div class="text-7xl animate-pulse">👑</div>
                    <h1 class="text-3xl font-black text-slate-800">Sijil Penghargaan Pasar Raya</h1>
                    <p class="text-slate-600 font-medium">Syabas diucapkan kepada <b>${gameState.playerName}</b> kerana telah berjaya menamatkan semua modul pengiraan silabus KSSR Malaysia!</p>
                    
                    <div class="grid grid-cols-3 gap-4 w-full my-2">
                        <div class="bg-orange-100/80 p-3 rounded-2xl border border-orange-200">
                            <div class="text-xs text-orange-600 font-bold uppercase">Jumlah Skor</div>
                            <div class="text-2xl font-black text-orange-700">${gameState.score}</div>
                        </div>
                        <div class="bg-yellow-100/80 p-3 rounded-2xl border border-yellow-200">
                            <div class="text-xs text-yellow-600 font-bold uppercase">Peti Syiling</div>
                            <div class="text-2xl font-black text-yellow-700">${gameState.coins}</div>
                        </div>
                        <div class="bg-amber-100/80 p-3 rounded-2xl border border-amber-200">
                            <div class="text-xs text-amber-600 font-bold uppercase">Bintang KSSR</div>
                            <div class="text-2xl font-black text-amber-700">${gameState.stars}</div>
                        </div>
                    </div>

                    <div class="w-full bg-emerald-500 text-white p-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-inner">
                        <i class="fa-solid fa-circle-check"></i> Data pencapaian anda telah disegerakan ke Firebase Cloud!
                    </div>

                    <button onclick="location.reload()" class="btn-3d-blue w-full py-3.5 text-white font-black text-xl rounded-2xl cursor-pointer">
                        MAIN SEMULA <i class="fa-solid fa-rotate-right ml-1"></i>
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
